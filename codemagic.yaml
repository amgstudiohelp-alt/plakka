workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.uygaria.plakka
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Verify iOS signing setup
        script: |
          set -e

          echo "Installed code signing identities:"
          security find-identity -v -p codesigning

          if ! security find-identity -v -p codesigning | grep -Eq "Apple Distribution|iPhone Distribution"; then
            echo "Expected an Apple Distribution/iPhone Distribution certificate for app_store signing."
            echo "Check Codemagic Code signing identities and make sure a matching .p12 certificate is available."
            exit 1
          fi

          if [ ! -f /Users/builder/export_options.plist ]; then
            echo "export_options.plist was not generated by xcode-project use-profiles."
            echo "Check that the provisioning profile matches bundle id com.uygaria.plakka and distribution_type app_store."
            exit 1
          fi

          echo "Generated export options:"
          plutil -p /Users/builder/export_options.plist

          echo "Resolved Runner signing build settings:"
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -showBuildSettings | grep -E "PRODUCT_BUNDLE_IDENTIFIER|DEVELOPMENT_TEAM|CODE_SIGN_STYLE|CODE_SIGN_IDENTITY|PROVISIONING_PROFILE_SPECIFIER"
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
